<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGCSEMYSG | Premium IGCSE & O-Level Tuition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--accent:#6366f1;--accent2:#8b5cf6;}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
font-family:Inter,sans-serif;
background:#f8fafc;
color:#111827;
overflow-x:hidden;
opacity:0;
animation:pageFadeIn 1s ease forwards;
}
nav{
position:fixed;top:20px;left:50%;
transform:translate(-50%,-20px);
width:min(1150px,92%);
padding:16px 24px;
display:flex;justify-content:space-between;align-items:center;
background:rgba(255,255,255,.75);
backdrop-filter:blur(20px);
border-radius:999px;
opacity:0;
animation:navReveal .9s ease .15s forwards;
}
.hero{
min-height:100vh;
display:flex;align-items:center;justify-content:center;
text-align:center;
background:linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
}
.hero-inner{
max-width:1000px;
opacity:0;
transform:translateY(40px);
animation:heroReveal 1.2s ease .35s forwards;
}
@keyframes pageFadeIn{from{opacity:0}to{opacity:1}}
@keyframes navReveal{
from{opacity:0;transform:translate(-50%,-20px)}
to{opacity:1;transform:translate(-50%,0)}
}
@keyframes heroReveal{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<nav><div>IGCSEMYSG</div></nav>
<section class="hero">
<div class="hero-inner">
<h1>Structured Academic Excellence For IGCSE & O-Level Students</h1>
<p>Fade-in version compiled.</p>
</div>
</section>
</body>
</html>
