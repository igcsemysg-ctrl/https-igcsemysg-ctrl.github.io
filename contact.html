<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Inter; background:#f6f7fb; }

nav {
  display:flex;
  justify-content:center;
  gap:20px;
  background:#111827;
  padding:15px;
}
nav a { color:white; text-decoration:none; font-weight:600; }

section {
  padding:70px 20px;
  text-align:center;
}

.box {
  max-width:500px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-family:inherit;
}

.btn {
  display:inline-block;
  margin-top:20px;
  padding:12px 20px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="how-we-help.html">How We Help</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
  <h2>Contact Us</h2>

  <div class="box">

    <p><strong>Email:</strong> igcsemysg@gmail.com</p>
    <p><strong>Phone:</strong> +60 17-273 1112</p>

    <hr>

    <h3>📘 Book Free Trial Class</h3>

    <input id="name" placeholder="Student Name">
    <input id="subject" placeholder="Subject">
    
    <select id="level">
      <option value="">Select Level</option>
      <option>IGCSE Year 9</option>
      <option>IGCSE Year 10</option>
      <option>IGCSE Year 11</option>
    </select>

    <input id="issue" placeholder="What are you struggling with?">

    <button class="btn" onclick="bookTrial()">Book via WhatsApp</button>

  </div>
</section>

<script>
function bookTrial() {
  let name = document.getElementById("name").value;
  let subject = document.getElementById("subject").value;
  let level = document.getElementById("level").value;
  let issue = document.getElementById("issue").value;

  let text =
`Hi, I want to book a FREE trial class:

Name: ${name}
Level: ${level}
Subject: ${subject}
Struggles: ${issue}`;

  let url = "https://wa.me/60172731112?text=" + encodeURIComponent(text);

  window.open(url, "_blank");
}
</script>

</body>
</html>
