<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enquiry - IGCSESGMY Tuition</title>

<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#f6f7fb,#eef2ff);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* CONTAINER */
.form-container {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(14px);
  padding: 45px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.08);
  text-align: center;
}

h2 { margin-bottom: 8px; }

.subtitle {
  color: #666;
  margin-bottom: 25px;
  font-size: 0.95em;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 14px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.1);
  font-family: inherit;
  font-size: 0.95em;
  transition: 0.2s;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #6366f1;
}

textarea {
  resize: none;
  height: 110px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 30px;
  background: #111;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  background: #000;
}

/* SUCCESS */
.success {
  display: none;
  font-weight: 600;
  color: #16a34a;
  margin-top: 15px;
}

/* WHATSAPP CTA */
.alt-cta {
  margin-top: 18px;
  display: inline-block;
  padding: 10px 20px;
  border-radius: 25px;
  background: rgba(37,211,102,0.1);
  color: #25D366;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.alt-cta:hover {
  transform: scale(1.05);
}

/* BACK */
.back {
  display: block;
  margin-top: 18px;
  font-size: 0.9em;
  color: #666;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="form-container">
  <h2>Enquiry Form</h2>
  <p class="subtitle">We typically respond within 24 hours.</p>

  <form id="enquiry-form" action="https://formspree.io/f/xgodzwzj" method="POST">

    <input type="text" name="name" placeholder="Student / Parent Name" required>
    
    <input type="email" name="email" placeholder="Email Address" required>
    
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <textarea 
      id="message"
      name="message" 
      placeholder="How can we assist you?">
    </textarea>

    <input type="hidden" name="_subject" value="New Tuition Enquiry">

    <button type="submit" id="submit-btn">Send Enquiry</button>

    <div class="success" id="success-msg">
      ✅ Enquiry sent! Redirecting...
    </div>

  </form>

  <!-- WHATSAPP -->
  <a id="wa-link" href="https://wa.me/60172731112" class="alt-cta" target="_blank">
    💬 Prefer WhatsApp? Chat instantly
  </a>

  <a href="index.html" class="back">← Back to Home</a>
</div>

<script>
const form = document.getElementById("enquiry-form");
const btn = document.getElementById("submit-btn");
const success = document.getElementById("success-msg");
const wa = document.getElementById("wa-link");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  btn.innerText = "Sending...";
  btn.disabled = true;

  const data = new FormData(form);

  const response = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  if (response.ok) {
    form.reset();
    success.style.display = "block";
    btn.innerText = "Sent ✓";

    setTimeout(()=>{
      window.location.href = "thankyou.html";
    }, 1500);
  } else {
    btn.innerText = "Error. Try again";
  }
});

/* WHATSAPP AUTO MESSAGE */
document.querySelectorAll("input, textarea").forEach(el=>{
  el.addEventListener("input", ()=>{
    const name = document.querySelector('[name="name"]').value;
    const msg = document.querySelector('[name="message"]').value;

    const text = `Hi, I'm enquiring about tuition. Name: ${name}. ${msg}`;
    wa.href = "https://wa.me/60172731112?text=" + encodeURIComponent(text);
  });
});
</script>

</body>
</html>
